{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom: 1.5rem;">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,#ef4444,#f97316);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;">♥</div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to HeartGuard to continue</p>
        </div>

        <form class="auth-form" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username" autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
