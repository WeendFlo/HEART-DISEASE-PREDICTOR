{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom: 1.5rem;">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,#ef4444,#f97316);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;">♥</div>
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Join HeartGuard to start predicting heart disease risk</p>
        </div>

        <form class="auth-form" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your display name">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Choose a password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
